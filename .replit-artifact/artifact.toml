kind = "mobile"
previewPath = "/"
title = "StreamWise TV"
version = "1.0.0"
id = "artifacts/streamwise-tv"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 23699
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/streamwise-tv run dev"

[services.env]
PORT = "23699"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/streamwise-tv", "run", "build"]
run = ["pnpm", "--filter", "@workspace/streamwise-tv", "run", "serve"]
